<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <style>
        :root {
            --bg-deep: #08080a;
            --bg-primary: #0c0c0f;
            --bg-elevated: #131318;
            --bg-surface: #1a1a22;
            --bg-surface-hover: #22222e;
            --border-subtle: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.1);
            --text-primary: #e8e6f0;
            --text-secondary: #8a879a;
            --text-muted: #55526a;
            --accent: #a78bfa;
            --accent-dim: rgba(167,139,250,0.12);
            --accent-glow: rgba(167,139,250,0.25);
            --user-bg: #1e1b4b;
            --user-border: rgba(129,140,248,0.2);
            --tool-accent: #f59e0b;
            --tool-bg: rgba(245,158,11,0.06);
            --tool-border: rgba(245,158,11,0.15);
            --error-accent: #f87171;
            --error-bg: rgba(248,113,113,0.06);
            --error-border: rgba(248,113,113,0.15);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Ambient background ── */
        body::before {
            content: '';
            position: fixed;
            top: -40%; left: -20%;
            width: 80%; height: 80%;
            background: radial-gradient(ellipse, rgba(167,139,250,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%; right: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(129,140,248,0.02) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: relative;
            z-index: 10;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(12,12,15,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 28px; height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 13px; color: #fff;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .header-session {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            padding: 7px 14px;
            border: 1px solid var(--border-medium);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 5px;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.14);
        }

        .btn:active { transform: scale(0.97); }

        .btn svg {
            width: 14px; height: 14px;
            opacity: 0.6;
        }

        .btn-label {
            display: inline;
        }

        /* ── Chat Area ── */
        #chat-container {
            position: relative;
            z-index: 1;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
        #chat-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

        /* Welcome state */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .welcome-icon {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff;
            margin-bottom: 4px;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .welcome h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .welcome p {
            font-size: 13px;
            color: var(--text-muted);
            max-width: 280px;
            line-height: 1.5;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Messages ── */
        .message {
            max-width: 720px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            line-height: 1.65;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: msgIn 0.25s ease;
            position: relative;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            color: #c7d2fe;
            border-bottom-right-radius: 4px;
            max-width: 80%;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message.tool-use {
            align-self: flex-start;
            background: transparent;
            border: none;
            padding: 2px 0;
            cursor: pointer;
            max-width: 90%;
            animation: msgIn 0.25s ease;
        }

        .tool-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            background: var(--tool-bg);
            border: 1px solid var(--tool-border);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--tool-accent);
            transition: background 0.15s;
            user-select: none;
        }

        .tool-header:hover {
            background: rgba(245,158,11,0.1);
        }

        .tool-header svg {
            width: 10px; height: 10px;
            transition: transform 0.2s;
            opacity: 0.5;
        }

        .tool-use.open .tool-header svg {
            transform: rotate(90deg);
        }

        .tool-details {
            display: none;
            margin-top: 4px;
            padding: 8px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .tool-use.open .tool-details {
            display: block;
        }

        .message.error {
            align-self: flex-start;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-accent);
            border-left: 3px solid var(--error-accent);
            border-radius: 2px var(--radius-sm) var(--radius-sm) 2px;
        }

        .message.system-msg {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            padding: 6px 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .message a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-dim);
            transition: border-color 0.2s;
        }
        .message a:hover {
            border-bottom-color: var(--accent);
        }

        /* ── Markdown content inside assistant messages ── */
        .message.assistant.rendered {
            white-space: normal;
        }

        .message.assistant.rendered p {
            margin: 0 0 0.6em 0;
            line-height: 1.65;
        }
        .message.assistant.rendered p:last-child { margin-bottom: 0; }

        .message.assistant.rendered h1,
        .message.assistant.rendered h2,
        .message.assistant.rendered h3 {
            margin: 1em 0 0.4em 0;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #fff;
        }
        .message.assistant.rendered h1:first-child,
        .message.assistant.rendered h2:first-child,
        .message.assistant.rendered h3:first-child { margin-top: 0; }

        .message.assistant.rendered h1 { font-size: 1.25em; }
        .message.assistant.rendered h2 { font-size: 1.1em; }
        .message.assistant.rendered h3 { font-size: 1em; color: var(--text-secondary); }

        .message.assistant.rendered ul,
        .message.assistant.rendered ol {
            margin: 0.4em 0 0.6em 1.4em;
            line-height: 1.65;
        }
        .message.assistant.rendered li { margin: 0.15em 0; }

        .message.assistant.rendered code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88em;
            background: rgba(255,255,255,0.06);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: #c9b4fa;
        }

        .message.assistant.rendered pre {
            margin: 0.6em 0;
            padding: 14px 16px;
            background: #0d0d12;
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .message.assistant.rendered pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 12.5px;
            line-height: 1.55;
            color: var(--text-primary);
        }

        .message.assistant.rendered blockquote {
            margin: 0.5em 0;
            padding: 0.4em 0 0.4em 14px;
            border-left: 3px solid var(--accent-dim);
            color: var(--text-secondary);
        }

        .message.assistant.rendered hr {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 1em 0;
        }

        .message.assistant.rendered table {
            border-collapse: collapse;
            margin: 0.6em 0;
            font-size: 0.9em;
            width: 100%;
        }
        .message.assistant.rendered th,
        .message.assistant.rendered td {
            border: 1px solid var(--border-medium);
            padding: 6px 10px;
            text-align: left;
        }
        .message.assistant.rendered th {
            background: var(--bg-surface);
            font-weight: 600;
            color: var(--text-primary);
        }

        .message.assistant.rendered strong { color: #fff; font-weight: 600; }
        .message.assistant.rendered em { color: var(--text-secondary); }

        /* Copy button on code blocks */
        .code-block-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px; right: 8px;
            padding: 4px 8px;
            font-size: 11px;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-surface);
            border: 1px solid var(--border-medium);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .code-block-wrapper:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); }

        /* ── Files panel (inline) ── */
        .files-panel {
            align-self: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            max-width: 380px;
            width: 100%;
            animation: msgIn 0.25s ease;
        }

        .files-panel-title {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }

        .files-panel-empty {
            color: var(--text-muted);
            font-size: 12px;
        }

        .files-panel-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-top: 1px solid var(--border-subtle);
        }

        .files-panel-row a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .files-panel-row a:hover { text-decoration: underline; }

        .files-panel-size {
            color: var(--text-muted);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Typing indicator ── */
        .typing-indicator {
            align-self: flex-start;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: msgIn 0.25s ease;
        }

        .typing-indicator .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.3;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.2; transform: scale(0.85); }
            30% { opacity: 1; transform: scale(1); }
        }

        .result-info {
            font-size: 10px;
            color: var(--text-muted);
            text-align: right;
            padding-right: 4px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.02em;
        }

        /* ── Input Area ── */
        #input-area {
            position: relative;
            z-index: 10;
            padding: 12px 16px;
            padding-bottom: calc(12px + var(--safe-bottom));
            background: rgba(12,12,15,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 760px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg);
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(167,139,250,0.3);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        #message-input {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            resize: none;
            min-height: 24px;
            max-height: 160px;
            line-height: 1.5;
            outline: none;
        }

        #message-input::placeholder {
            color: var(--text-muted);
        }

        .input-btn {
            width: 36px; height: 36px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #send-btn {
            background: var(--accent);
            color: #fff;
        }
        #send-btn:hover { background: #8b5cf6; transform: scale(1.04); }
        #send-btn:active { transform: scale(0.96); }

        #send-btn svg, #stop-btn svg {
            width: 18px; height: 18px;
        }

        #stop-btn {
            background: var(--error-accent);
            color: #fff;
            display: none;
        }
        #stop-btn:hover { background: #ef4444; }

        /* ── Connection dot ── */
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .status-dot.connected { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.4); }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            header { padding: 10px 14px; }

            .header-title { font-size: 14px; }
            .header-session { display: none; }

            .btn { padding: 6px 10px; font-size: 11px; }
            .btn-label { display: none; }
            .btn svg { opacity: 0.8; }

            #chat-container {
                padding: 16px 12px;
                gap: 4px;
            }

            .message {
                font-size: 13.5px;
                padding: 9px 13px;
                max-width: 90% !important;
            }

            .message.tool-use { font-size: 11px; max-width: 95% !important; }

            #input-area { padding: 8px 10px; padding-bottom: calc(8px + var(--safe-bottom)); }

            .input-row {
                padding: 4px 4px 4px 14px;
                border-radius: 16px;
            }

            #message-input { font-size: 16px; } /* prevents zoom on iOS */

            .input-btn { width: 34px; height: 34px; }

            .welcome h2 { font-size: 18px; }
            .welcome p { font-size: 12px; }
        }

        @media (max-width: 380px) {
            .btn { padding: 5px 8px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-brand">
            <div class="header-logo">C</div>
            <div>
                <div class="header-title">Claude Portal</div>
                <div class="header-session" id="session-display"></div>
            </div>
        </div>
        <div class="header-actions">
            <div class="status-dot" id="status-dot"></div>
            <button class="btn" onclick="showFiles()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span class="btn-label">Files</span>
            </button>
            <button class="btn" onclick="newSession()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span class="btn-label">New</span>
            </button>
        </div>
    </header>

    <div id="chat-container">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">C</div>
            <h2>What can I help with?</h2>
            <p>Ask me to build, create, analyze, or explore anything.</p>
        </div>
    </div>

    <div id="input-area">
        <div class="input-row">
            <textarea id="message-input" placeholder="Message Claude..." rows="1"></textarea>
            <button class="input-btn" id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
            <button class="input-btn" id="stop-btn" onclick="stopGeneration()">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
        </div>
    </div>

    <script>
        // Configure marked for safe rendering
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true,
        });

        var ws = null;
        var sessionId = null;
        var currentAssistantEl = null;
        var currentRawText = '';  // accumulate raw text during streaming
        var isGenerating = false;

        function generateId() {
            return crypto.randomUUID();
        }

        function setConnected(connected) {
            var dot = document.getElementById('status-dot');
            if (connected) {
                dot.classList.add('connected');
            } else {
                dot.classList.remove('connected');
            }
        }

        function hideWelcome() {
            var w = document.getElementById('welcome');
            if (w) w.remove();
        }

        function connect(sid) {
            sessionId = sid;
            document.getElementById('session-display').textContent = sid.slice(0, 8);

            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '/ws/' + sid);

            ws.onopen = function() {
                setConnected(true);
                isGenerating = false;
                document.getElementById('send-btn').style.display = '';
                document.getElementById('stop-btn').style.display = 'none';
            };
            ws.onclose = function() {
                setConnected(false);
                isGenerating = false;
                document.getElementById('send-btn').style.display = '';
                document.getElementById('stop-btn').style.display = 'none';
            };
            ws.onerror = function() {
                setConnected(false);
            };

            ws.onmessage = function(event) {
                var data = JSON.parse(event.data);
                handleEvent(data);
            };
        }

        function handleEvent(data) {
            var chat = document.getElementById('chat-container');

            switch (data.type) {
                case 'assistant':
                    removeTypingIndicator();
                    currentRawText = data.content;
                    currentAssistantEl = addMessage(data.content, 'assistant');
                    break;

                case 'text_delta':
                    removeTypingIndicator();
                    if (!currentAssistantEl) {
                        currentRawText = '';
                        currentAssistantEl = addMessage('', 'assistant');
                    }
                    currentRawText += data.content;
                    currentAssistantEl.textContent = currentRawText;
                    scrollToBottom();
                    break;

                case 'tool_use':
                    removeTypingIndicator();
                    var toolEl = document.createElement('div');
                    toolEl.className = 'message tool-use';

                    var header = document.createElement('div');
                    header.className = 'tool-header';
                    // Chevron icon
                    var chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    chevron.setAttribute('viewBox', '0 0 24 24');
                    chevron.setAttribute('fill', 'none');
                    chevron.setAttribute('stroke', 'currentColor');
                    chevron.setAttribute('stroke-width', '2.5');
                    var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                    polyline.setAttribute('points', '9 18 15 12 9 6');
                    chevron.appendChild(polyline);
                    header.appendChild(chevron);
                    var nameSpan = document.createElement('span');
                    nameSpan.textContent = data.tool;
                    header.appendChild(nameSpan);

                    var details = document.createElement('div');
                    details.className = 'tool-details';
                    details.textContent = data.input;

                    header.addEventListener('click', function() {
                        toolEl.classList.toggle('open');
                    });

                    toolEl.appendChild(header);
                    toolEl.appendChild(details);
                    chat.appendChild(toolEl);
                    scrollToBottom();
                    break;

                case 'error':
                    removeTypingIndicator();
                    addMessage(data.content, 'error');
                    break;

                case 'result':
                    if (data.cost || data.duration) {
                        var info = document.createElement('div');
                        info.className = 'result-info';
                        var text = '';
                        if (data.duration) text += (data.duration / 1000).toFixed(1) + 's';
                        if (data.cost) text += (text ? ' · ' : '') + '$' + data.cost.toFixed(4);
                        info.textContent = text;
                        chat.appendChild(info);
                    }
                    break;

                case 'done':
                    isGenerating = false;
                    // Render all unrendered assistant messages as markdown
                    var msgs = chat.querySelectorAll('.message.assistant:not(.rendered)');
                    msgs.forEach(function(msg) { renderMarkdown(msg); });
                    currentAssistantEl = null;
                    currentRawText = '';
                    document.getElementById('send-btn').style.display = '';
                    document.getElementById('stop-btn').style.display = 'none';
                    document.getElementById('message-input').focus();
                    removeTypingIndicator();
                    break;

                case 'system':
                    break;

                case 'raw':
                    removeTypingIndicator();
                    if (!currentAssistantEl) {
                        currentAssistantEl = addMessage('', 'assistant');
                    }
                    try {
                        var parsed = JSON.parse(data.content);
                        if (parsed.content) {
                            currentAssistantEl.textContent += (typeof parsed.content === 'string' ? parsed.content : JSON.stringify(parsed.content));
                        } else {
                            currentAssistantEl.textContent += JSON.stringify(parsed);
                        }
                    } catch(e) {
                        currentAssistantEl.textContent += data.content;
                    }
                    scrollToBottom();
                    break;
            }
        }

        function addMessage(content, type) {
            hideWelcome();
            var chat = document.getElementById('chat-container');
            var el = document.createElement('div');
            el.className = 'message ' + type;
            el.textContent = content;
            chat.appendChild(el);
            scrollToBottom();
            return el;
        }

        function addSystemMessage(text) {
            var chat = document.getElementById('chat-container');
            var el = document.createElement('div');
            el.className = 'message system-msg';
            el.textContent = text;
            chat.appendChild(el);
        }

        function addTypingIndicator() {
            removeTypingIndicator();
            var chat = document.getElementById('chat-container');
            var el = document.createElement('div');
            el.className = 'typing-indicator';
            el.id = 'typing';
            for (var i = 0; i < 3; i++) {
                var dot = document.createElement('div');
                dot.className = 'dot';
                el.appendChild(dot);
            }
            chat.appendChild(el);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            var el = document.getElementById('typing');
            if (el) el.remove();
        }

        function scrollToBottom() {
            var chat = document.getElementById('chat-container');
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            var input = document.getElementById('message-input');
            var text = input.value.trim();
            if (!text) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addSystemMessage('Reconnecting...');
                connect(sessionId || generateId());
                return;
            }

            addMessage(text, 'user');
            addTypingIndicator();
            ws.send(JSON.stringify({ type: 'message', content: text }));

            input.value = '';
            input.style.height = 'auto';
            currentAssistantEl = null;
            isGenerating = true;
            document.getElementById('send-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = '';
        }

        function renderMarkdown(el) {
            var raw = el.textContent;
            if (!raw.trim()) return;

            // Sanitize: create a temporary div to get escaped HTML, then parse markdown
            // marked.parse handles the markdown -> HTML conversion
            var html = marked.parse(raw);

            // Only allow /files/ links to be clickable, open external links safely
            el.classList.add('rendered');
            el.textContent = '';
            el.insertAdjacentHTML('beforeend', html);

            // Make all links safe
            var links = el.querySelectorAll('a');
            links.forEach(function(a) {
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
            });

            // Wrap pre blocks with copy button
            var pres = el.querySelectorAll('pre');
            pres.forEach(function(pre) {
                var wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                var btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.addEventListener('click', function() {
                    var code = pre.querySelector('code');
                    var text = code ? code.textContent : pre.textContent;
                    navigator.clipboard.writeText(text).then(function() {
                        btn.textContent = 'Copied!';
                        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
                    });
                });
                wrapper.appendChild(btn);
            });

            scrollToBottom();
        }

        function showFiles() {
            fetch('/api/files').then(function(r) { return r.json(); }).then(function(data) {
                hideWelcome();
                var chat = document.getElementById('chat-container');
                var el = document.createElement('div');
                el.className = 'files-panel';
                if (!data.files || data.files.length === 0) {
                    var title = document.createElement('div');
                    title.className = 'files-panel-title';
                    title.textContent = 'Files';
                    el.appendChild(title);
                    var empty = document.createElement('div');
                    empty.className = 'files-panel-empty';
                    empty.textContent = 'No files yet. Ask Claude to create one.';
                    el.appendChild(empty);
                } else {
                    var title = document.createElement('div');
                    title.className = 'files-panel-title';
                    title.textContent = 'Files (' + data.files.length + ')';
                    el.appendChild(title);
                    data.files.forEach(function(f) {
                        var row = document.createElement('div');
                        row.className = 'files-panel-row';
                        var a = document.createElement('a');
                        a.href = f.url;
                        a.textContent = f.name;
                        a.target = '_blank';
                        var size = document.createElement('span');
                        size.className = 'files-panel-size';
                        var kb = f.size / 1024;
                        size.textContent = kb >= 1024 ? (kb / 1024).toFixed(1) + ' MB' : kb.toFixed(1) + ' KB';
                        row.appendChild(a);
                        row.appendChild(size);
                        el.appendChild(row);
                    });
                }
                chat.appendChild(el);
                scrollToBottom();
            });
        }

        function stopGeneration() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop' }));
            }
        }

        function newSession() {
            if (ws) ws.close();
            var chat = document.getElementById('chat-container');
            chat.textContent = '';
            // Re-add welcome
            var w = document.createElement('div');
            w.className = 'welcome';
            w.id = 'welcome';
            var icon = document.createElement('div');
            icon.className = 'welcome-icon';
            icon.textContent = 'C';
            var h2 = document.createElement('h2');
            h2.textContent = 'What can I help with?';
            var p = document.createElement('p');
            p.textContent = 'Ask me to build, create, analyze, or explore anything.';
            w.appendChild(icon);
            w.appendChild(h2);
            w.appendChild(p);
            chat.appendChild(w);
            connect(generateId());
        }

        // Auto-resize textarea
        var textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        textarea.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isGenerating) sendMessage();
            }
        });

        // Initialize
        connect(generateId());
    </script>
</body>
</html>
